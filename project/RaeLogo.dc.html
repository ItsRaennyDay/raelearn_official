<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
</helmet>

<sc-if value="{{ stacked }}" hint-placeholder-val="{{ false }}">
  <div style="display:inline-flex;flex-direction:column;align-items:center;gap:11px">
    <svg viewBox="0 0 64 64" width="{{ mark }}" height="{{ mark }}" style="display:block;flex-shrink:0">
      <defs><linearGradient id="rl-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5A3DF5"></stop><stop offset=".55" stop-color="#4B6FF5"></stop><stop offset="1" stop-color="#2D8BFF"></stop></linearGradient></defs>
      <rect x="0" y="0" width="64" height="64" rx="17" fill="url(#rl-grad)"></rect>
      <g fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 15 V43"></path><path d="M23 15 H35 C46 15 46 31 35 31 H23"></path><path d="M33 31 L45 44"></path><path d="M23 43 H42"></path></g>
      <g stroke="#BFE0FF" stroke-width="2.6" stroke-linecap="round" opacity=".8"><path d="M19 50 H44"></path><path d="M22 55 H41"></path></g>
    </svg>
    <div style="display:flex;flex-direction:column;align-items:center;line-height:1">
      <span style="font-family:'Poppins',sans-serif;font-weight:600;font-size:{{ word }}px;letter-spacing:-.01em;color:{{ wordColor }}">RaeLearn</span>
      <span style="font-family:'Poppins',sans-serif;font-weight:500;font-size:{{ tag }}px;letter-spacing:.34em;text-transform:uppercase;color:{{ tagColor }};margin-top:7px">EdTech &middot; Learn &middot; Grow</span>
    </div>
  </div>
</sc-if>

<sc-if value="{{ inline }}" hint-placeholder-val="{{ true }}">
  <div style="display:inline-flex;align-items:center;gap:12px">
    <svg viewBox="0 0 64 64" width="{{ mark }}" height="{{ mark }}" style="display:block;flex-shrink:0">
      <defs><linearGradient id="rl-grad2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5A3DF5"></stop><stop offset=".55" stop-color="#4B6FF5"></stop><stop offset="1" stop-color="#2D8BFF"></stop></linearGradient></defs>
      <rect x="0" y="0" width="64" height="64" rx="17" fill="url(#rl-grad2)"></rect>
      <g fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 15 V43"></path><path d="M23 15 H35 C46 15 46 31 35 31 H23"></path><path d="M33 31 L45 44"></path><path d="M23 43 H42"></path></g>
      <g stroke="#BFE0FF" stroke-width="2.6" stroke-linecap="round" opacity=".8"><path d="M19 50 H44"></path><path d="M22 55 H41"></path></g>
    </svg>
    <sc-if value="{{ showWord }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;flex-direction:column;line-height:1">
        <span style="font-family:'Poppins',sans-serif;font-weight:600;font-size:{{ word }}px;letter-spacing:-.01em;color:{{ wordColor }}">RaeLearn</span>
        <span style="font-family:'Poppins',sans-serif;font-weight:500;font-size:{{ tag }}px;letter-spacing:.26em;text-transform:uppercase;color:{{ tagColor }};margin-top:5px;white-space:nowrap">EdTech &middot; Learn &middot; Grow</span>
      </div>
    </sc-if>
  </div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:260,&quot;height&quot;:80},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;full&quot;,&quot;stacked&quot;,&quot;icon&quot;],&quot;default&quot;:&quot;full&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;markSize&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:34,&quot;min&quot;:20,&quot;max&quot;:120,&quot;tsType&quot;:&quot;number&quot;},&quot;wordSize&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:null,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const variant = this.props.variant || 'full';
    const tone = this.props.tone || 'dark';
    const mark = this.props.markSize || 34;
    return {
      stacked: variant==='stacked',
      inline: variant==='full' || variant==='icon',
      showWord: variant!=='icon',
      mark,
      word: this.props.wordSize || Math.round(mark*0.56),
      tag: Math.max(6.5, Math.round(mark*0.18)),
      wordColor: tone==='dark' ? '#0F1023' : '#FFFFFF',
      tagColor: tone==='dark' ? '#8A90A6' : 'rgba(255,255,255,.72)',
    };
  }
}
</script>
</body>
</html>
