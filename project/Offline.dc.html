<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{background:#F1F3FB;color:#0F1023;font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:clip}
    a{color:inherit;text-decoration:none}
    h1{text-wrap:balance}
  </style>
</helmet>

<main style="position:relative;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px">
  <dc-import name="BrandBackdrop" tone="light" hint-size="100%,100%" style="position:absolute;inset:0"></dc-import>

  <header style="position:absolute;top:24px;left:28px;z-index:3"><dc-import name="RaeLogo" variant="full" tone="dark" mark-size="30" hint-size="190px,42px"></dc-import></header>

  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;max-width:540px">
    <div style="position:relative;width:clamp(180px,22vw,232px);height:clamp(180px,22vw,232px);display:flex;align-items:center;justify-content:center;margin-bottom:8px">
      <span style="position:absolute;inset:0;border-radius:50%;background:#00C6E8;opacity:.1"></span>
      <div style="position:relative;width:72%;height:72%"><dc-import name="StateArt" kind="wifi" accent="#00C6E8" hint-size="100%,100%"></dc-import></div>
    </div>

    <span style="display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#0090AD;background:#DAF5FB;padding:6px 14px;border-radius:99px">No connection</span>
    <h1 style="font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(28px,3.6vw,42px);line-height:1.08;margin:15px 0 0;color:#0F1023">You&rsquo;re offline</h1>
    <p style="font-size:clamp(14px,1.4vw,16.5px);line-height:1.6;font-weight:500;color:#4B5563;margin:13px 0 0">We can&rsquo;t reach the internet right now. Check your connection and give it another try.</p>

    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;margin-top:28px">
      <a href="#" style="display:inline-flex;align-items:center;gap:9px;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg,#5A3DF5,#2D8BFF);padding:14px 26px;border-radius:13px;box-shadow:0 14px 30px -12px rgba(90,61,245,.55)" style-hover="transform:translateY(-1px);box-shadow:0 18px 36px -12px rgba(90,61,245,.6)"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"></path><path d="M21 3v5h-5"></path></svg>Try again</a>
      <a href="RaeLearn Homepage.dc.html" style="font-size:14.5px;font-weight:600;color:#6B7280" style-hover="color:#0F1023">Go home</a>
    </div>
  </div>
</main>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}"></script>
</body>
</html>
