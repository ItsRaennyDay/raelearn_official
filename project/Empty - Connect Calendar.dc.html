<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{background:#F1F3FB;color:#0F1023;font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:clip}
    a{color:inherit;text-decoration:none}
    h1{text-wrap:balance}
  </style>
</helmet>

<main style="position:relative;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px">
  <dc-import name="BrandBackdrop" tone="light" hint-size="100%,100%" style="position:absolute;inset:0"></dc-import>

  <header style="position:absolute;top:24px;left:28px;z-index:3;display:flex;align-items:center;gap:11px">
    <dc-import name="RaeLogo" variant="full" tone="dark" mark-size="30" hint-size="190px,42px"></dc-import>
    <span style="font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#1F6FE0;background:#E4F0FF;padding:4px 10px;border-radius:7px">Learner</span>
  </header>

  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;max-width:540px">
    <div style="position:relative;width:clamp(180px,22vw,234px);height:clamp(180px,22vw,234px);display:flex;align-items:center;justify-content:center;margin-bottom:8px">
      <span style="position:absolute;inset:0;border-radius:50%;background:#7B61FF;opacity:.09"></span>
      <div style="position:relative;width:72%;height:72%"><dc-import name="StateArt" kind="calendar" accent="#7B61FF" hint-size="100%,100%"></dc-import></div>
    </div>

    <span style="display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#5A3CDB;background:#EEEBFF;padding:6px 14px;border-radius:99px">Calendar</span>
    <h1 style="font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(27px,3.4vw,40px);line-height:1.08;margin:14px 0 0;color:#0F1023">Connect your calendar</h1>
    <p style="font-size:clamp(14px,1.4vw,16.5px);line-height:1.6;font-weight:500;color:#4B5563;margin:12px 0 0">You haven&rsquo;t connected your calendar yet. Sync it to see deadlines and study blocks right here.</p>

    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;margin-top:26px">
      <a href="#" style="display:inline-flex;align-items:center;gap:9px;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg,#5A3DF5,#2D8BFF);padding:14px 26px;border-radius:13px;box-shadow:0 14px 30px -12px rgba(90,61,245,.55)" style-hover="transform:translateY(-1px);box-shadow:0 18px 36px -12px rgba(90,61,245,.6)">Connect calendar<span style="font-size:17px;line-height:1">&rarr;</span></a>
      <a href="Learner Dashboard.dc.html" style="font-size:14.5px;font-weight:600;color:#6B7280" style-hover="color:#0F1023">Maybe later</a>
    </div>
  </div>
</main>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}"></script>
</body>
</html>
