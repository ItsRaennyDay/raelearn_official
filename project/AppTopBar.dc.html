<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<header style="position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:13px 30px;background:rgba(255,255,255,.86);backdrop-filter:saturate(140%) blur(10px);-webkit-backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid #E7E9F2">

  <div style="min-width:0">
    <div style="font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:#A6ACC0">{{ eyebrow }}</div>
    <h1 style="font-family:'Poppins',serif;font-weight:800;font-size:20px;margin:2px 0 0;color:#0F1023;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ title }}</h1>
  </div>

  <div style="display:flex;align-items:center;gap:13px;flex-shrink:0">

    <div style="display:inline-flex;align-items:center;background:#E7E9F2;border-radius:11px;padding:3px;gap:2px">
      <a href="{{ learnerHref }}" style="{{ learnerPill }}">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v13"></path><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H12v13H5.5A2.5 2.5 0 0 0 3 19.5z"></path><path d="M21 6.5A2.5 2.5 0 0 0 18.5 4H12"></path></svg>Learner
      </a>
      <a href="{{ adminHref }}" style="{{ adminPill }}">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"></circle><path d="M3.5 19c0-3 2.5-4.6 5.5-4.6s5.5 1.6 5.5 4.6"></path><path d="M18 8.5l1.6 1.6L23 6.7"></path></svg>Admin
      </a>
    </div>

    <a href="{{ notifHref }}" title="Notifications" style="position:relative;width:40px;height:40px;border-radius:11px;border:1px solid #E1E5F0;background:#FFFFFF;display:flex;align-items:center;justify-content:center;color:#4B5563" style-hover="border-color:#C7CCDC">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.5 21a2 2 0 0 1-3 0"></path></svg>
      <span style="position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;background:#7B61FF;border:2px solid #FFFFFF"></span>
    </a>

    <a href="{{ profileHref }}" style="display:flex;align-items:center;gap:9px;padding:5px 11px 5px 5px;border-radius:13px;border:1px solid #E1E5F0;background:#FFFFFF" style-hover="border-color:#C7CCDC">
      <span style="width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;background:{{ avBg }};color:{{ avColor }}">{{ initials }}</span>
      <div style="line-height:1.25;white-space:nowrap">
        <div style="font-size:12.5px;font-weight:700;color:#0F1023">{{ userName }}</div>
        <div style="font-size:10.5px;color:#8A90A6">{{ contextLabel }}</div>
      </div>
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#A6ACC0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:2px"><path d="M6 9l6 6 6-6"></path></svg>
    </a>

  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:68},&quot;mode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;learner&quot;,&quot;admin&quot;],&quot;default&quot;:&quot;learner&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;eyebrow&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;My learning&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Dashboard&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;userName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Maria Sandoval&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;contextLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Learner view&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;initials&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;MS&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const mode = this.props.mode || 'learner';
    const isAdmin = mode === 'admin';
    const pill = 'display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;font-size:13px;text-decoration:none';
    const active = pill + ';background:#FFFFFF;color:#0F1023;font-weight:700;box-shadow:0 1px 2px rgba(15,16,35,.12)';
    const idle = pill + ';background:transparent;color:#857E70;font-weight:600';
    return {
      eyebrow: this.props.eyebrow || (isAdmin ? 'Raeform Foundation' : 'My learning'),
      title: this.props.title || (isAdmin ? 'Admin Dashboard' : 'Dashboard'),
      learnerHref: 'Learner Dashboard.dc.html',
      adminHref: 'Group Admin Dashboard.dc.html',
      learnerPill: isAdmin ? idle : active,
      adminPill: isAdmin ? active : idle,
      notifHref: isAdmin ? 'Group Admin Dashboard.dc.html' : 'Notifications.dc.html',
      profileHref: 'Profile.dc.html',
      userName: this.props.userName || 'Maria Sandoval',
      contextLabel: this.props.contextLabel || (isAdmin ? 'Admin view' : 'Learner view'),
      initials: this.props.initials || 'MS',
      avBg: isAdmin ? '#0F1023' : '#5A3DF5',
      avColor: isAdmin ? '#00C6E8' : '#FFFFFF',
    };
  }
}
</script>
</body>
</html>
