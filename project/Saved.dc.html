<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{background:#F1F3FB;color:#0F1023;font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:clip}
    a{color:inherit;text-decoration:none}
    h1,h2,h3{text-wrap:balance}
  </style>
</helmet>

<div style="display:flex;align-items:stretch;min-height:100vh">
  <dc-import name="AppSidebar" mode="learner" current="saved" hint-size="248px,100%" style="flex:0 0 248px"></dc-import>

  <div style="flex:1;min-width:0;display:flex;flex-direction:column;min-height:100vh;background:#F1F3FB">
    <dc-import name="AppTopBar" mode="learner" eyebrow="Library" title="Saved" hint-size="100%,68px" style="display:block;width:100%"></dc-import>

    <main style="flex:1;width:100%;max-width:1020px;margin:0 auto;padding:26px 30px 64px">

      <!-- COURSES -->
      <section style="margin-bottom:26px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><h2 style="font-family:'Poppins',serif;font-weight:700;font-size:18px;margin:0;color:#0F1023">Saved courses</h2><a href="Courses.dc.html" style="font-size:13px;font-weight:700;color:#5A3DF5">Browse →</a></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:13px">
          <sc-for list="{{ courses }}" as="c" hint-placeholder-count="3">
            <div style="background:#fff;border:1px solid #E7E9F2;border-radius:14px;padding:18px;position:relative">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px"><span style="{{ c.tagChip }}">{{ c.tag }}</span><svg viewBox="0 0 24 24" width="18" height="18" fill="#7B61FF" stroke="#7B61FF" stroke-width="2" stroke-linejoin="round" style="flex-shrink:0;cursor:pointer"><path d="M6 4h12v17l-6-4-6 4z"></path></svg></div>
              <div style="font-family:'Poppins',serif;font-weight:700;font-size:16px;margin:12px 0 5px;color:#0F1023">{{ c.title }}</div>
              <div style="font-size:12.5px;color:#8A90A6;margin-bottom:14px">{{ c.meta }}</div>
              <a href="Course Detail.dc.html" style="display:block;text-align:center;font-size:13px;font-weight:700;color:#0F1023;border:1.5px solid #E1E5F0;padding:9px 0;border-radius:9px" style-hover="border-color:#0F1023">View course</a>
            </div>
          </sc-for>
        </div>
      </section>

      <!-- PATHS -->
      <section style="margin-bottom:26px">
        <h2 style="font-family:'Poppins',serif;font-weight:700;font-size:18px;margin:0 0 14px;color:#0F1023">Saved paths</h2>
        <div style="display:flex;flex-direction:column;gap:11px">
          <sc-for list="{{ paths }}" as="p" hint-placeholder-count="2">
            <div style="display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #E7E9F2;border-radius:13px;padding:15px 18px">
              <span style="width:42px;height:42px;border-radius:11px;background:#EDE7F9;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#7B61FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="19" r="3"></circle><circle cx="18" cy="5" r="3"></circle><path d="M6 16V9a4 4 0 0 1 4-4h5"></path></svg></span>
              <div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700;color:#0F1023">{{ p.title }}</div><div style="font-size:12px;color:#8A90A6;margin-top:2px">{{ p.meta }}</div></div>
              <a href="Learning Paths.dc.html" style="font-size:13px;font-weight:700;color:#0F1023;border:1.5px solid #E1E5F0;padding:9px 15px;border-radius:9px;white-space:nowrap" style-hover="border-color:#0F1023">View path</a>
            </div>
          </sc-for>
        </div>
      </section>

      <!-- RESOURCES -->
      <section>
        <h2 style="font-family:'Poppins',serif;font-weight:700;font-size:18px;margin:0 0 14px;color:#0F1023">Saved resources</h2>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px">
          <sc-for list="{{ resources }}" as="r" hint-placeholder-count="2">
            <a href="Resources.dc.html" style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E7E9F2;border-radius:13px;padding:14px 16px" style-hover="border-color:#C7CCDC">
              <span style="width:36px;height:36px;border-radius:9px;background:#ECE9FE;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="#7B61FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path></svg></span>
              <div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:700;color:#0F1023">{{ r.title }}</div><div style="font-size:11.5px;color:#9AA1B4">{{ r.meta }}</div></div>
            </a>
          </sc-for>
        </div>
      </section>

    </main>

    <dc-import name="SiteFooter" hint-size="100%,360px" style="display:block;width:100%"></dc-import>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  renderVals() {
    const tagChip = (t) => 'font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:6px;' + ({ Nonprofit:'color:#7B61FF;background:#EDE7F9', Grants:'color:#7B61FF;background:#ECE9FE', Technical:'color:#1F6F8B;background:#E2EEF2' }[t] || 'color:#857E70;background:#EFEAE0');
    const courses = [
      { tag:'Grants', title:'Grant Writing for VAs', meta:'~6 hrs · intermediate' },
      { tag:'Nonprofit', title:'Volunteer Coordination', meta:'~2 hrs · beginner' },
      { tag:'Technical', title:'Intro to Airtable for VAs', meta:'~3 hrs · beginner' },
    ].map(c => ({ ...c, tagChip: tagChip(c.tag) }));
    const paths = [
      { title:'Donor Operations Path', meta:'4 courses · certificate' },
      { title:'Grant Admin VA Path', meta:'5 courses · certificate' },
    ];
    const resources = [
      { title:'Monthly board report kit', meta:'Workbook bundle' },
      { title:'Client onboarding pack', meta:'Template · PDF' },
    ];
    return { courses, paths, resources };
  }
}
</script>
</body>
</html>
