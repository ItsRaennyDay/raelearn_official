<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{background:#F1F3FB;color:#0F1023;font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:clip}
    a{color:inherit;text-decoration:none}
    h1{text-wrap:balance}
  </style>
</helmet>

<main style="position:relative;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px">
  <dc-import name="BrandBackdrop" tone="light" hint-size="100%,100%" style="position:absolute;inset:0"></dc-import>

  <header style="position:absolute;top:24px;left:28px;z-index:3"><dc-import name="RaeLogo" variant="full" tone="dark" mark-size="30" hint-size="190px,42px"></dc-import></header>
  <a href="Help Center.dc.html" style="position:absolute;top:30px;right:28px;font-size:13.5px;font-weight:600;color:#4B5563;z-index:3" style-hover="color:#0F1023">Help Center</a>

  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;max-width:560px">
    <div style="position:relative;width:clamp(210px,27vw,300px);height:clamp(186px,24vw,262px);display:flex;align-items:center;justify-content:center;margin-bottom:2px">
      <span style="position:absolute;font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(150px,22vw,258px);color:#2D8BFF;opacity:.09;line-height:1;letter-spacing:-.04em;z-index:0">404</span>
      <div style="position:relative;z-index:1;width:60%;height:60%"><dc-import name="StateArt" kind="map" accent="#2D8BFF" hint-size="100%,100%"></dc-import></div>
    </div>

    <span style="display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#1F6FE0;background:#E4F0FF;padding:6px 14px;border-radius:99px">Error 404</span>
    <h1 style="font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(28px,3.6vw,42px);line-height:1.08;margin:15px 0 0;color:#0F1023">We couldn&rsquo;t find that page</h1>
    <p style="font-size:clamp(14px,1.4vw,16.5px);line-height:1.6;font-weight:500;color:#4B5563;margin:13px 0 0">The page you&rsquo;re looking for may have moved, or it might never have existed. Let&rsquo;s point you somewhere useful.</p>

    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;margin-top:28px">
      <a href="RaeLearn Homepage.dc.html" style="display:inline-flex;align-items:center;gap:9px;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg,#5A3DF5,#2D8BFF);padding:14px 26px;border-radius:13px;box-shadow:0 14px 30px -12px rgba(90,61,245,.55)" style-hover="transform:translateY(-1px);box-shadow:0 18px 36px -12px rgba(90,61,245,.6)">Go home<span style="font-size:17px;line-height:1">&rarr;</span></a>
      <a href="Courses.dc.html" style="font-size:14.5px;font-weight:600;color:#6B7280" style-hover="color:#0F1023">Browse courses</a>
    </div>
  </div>
</main>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}"></script>
</body>
</html>
