<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<header style="position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid #E7E9F2">
  <nav style="max-width:1240px;margin:0 auto;padding:13px 28px;display:flex;align-items:center;gap:26px;flex-wrap:wrap">
    <a href="RaeLearn Homepage.dc.html" style="display:flex;flex-direction:column;line-height:1;margin-right:4px">
      <span style="font-family:'Poppins',serif;font-weight:800;font-size:23px;letter-spacing:-.01em;color:#0F1023">RaeLearn</span>
      <span style="font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#A6ACC0;margin-top:3px">by RAEFORM</span>
    </a>
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;font-size:14px;font-weight:500">
      <sc-for list="{{ links }}" as="lnk" hint-placeholder-count="6">
        <a href="{{ lnk.href }}" style="{{ lnk.style }}" style-hover="color:#0F1023;border-bottom-color:#C7CCDC">{{ lnk.label }}</a>
      </sc-for>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-left:auto">
      <a href="Individual Signup.dc.html" style="font-size:14px;font-weight:600;color:#4B5563;padding:9px 4px;white-space:nowrap" style-hover="color:#0F1023">Sign In</a>
      <a href="Individual Signup.dc.html" style="font-size:13.5px;font-weight:700;color:#fff;background:#0F1023;padding:11px 17px;border-radius:10px;white-space:nowrap" style-hover="background:#000">Start Learning</a>
      <a href="Group Signup.dc.html" style="font-size:13.5px;font-weight:700;color:#0F1023;background:transparent;border:1.5px solid #0F1023;padding:9.5px 15px;border-radius:10px;white-space:nowrap" style-hover="background:#0F1023;color:#fff">Create Group Account</a>
    </div>
  </nav>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:72},&quot;current&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const cur = this.props.current || '';
    const items = [
      { key: 'courses', label: 'Courses', href: 'Courses.dc.html' },
      { key: 'paths', label: 'Learning Paths', href: 'Learning Paths.dc.html' },
      { key: 'vas', label: 'For VAs', href: 'For VAs.dc.html' },
      { key: 'founders', label: 'For Founders & Teams', href: 'Founders & Teams.dc.html' },
      { key: 'free', label: 'Free Courses', href: 'Free Courses.dc.html' },
      { key: 'pricing', label: 'Pricing', href: 'Pricing.dc.html' },
    ];
    const base = 'padding:6px 0;border-bottom:2px solid transparent;white-space:nowrap;color:';
    const links = items.map(it => ({
      label: it.label,
      href: it.href,
      style: it.key === cur
        ? base + '#0F1023;border-bottom-color:#0F1023;font-weight:700'
        : base + '#4B5563',
    }));
    return { links };
  }
}
</script>
</body>
</html>
