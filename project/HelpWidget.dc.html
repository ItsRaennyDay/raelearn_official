<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="{{ containerStyle }}">
  <sc-if value="{{ helpOpen }}" hint-placeholder-val="{{ false }}">
    <div style="width:328px;background:#fff;border:1px solid #E6DECD;border-radius:18px;box-shadow:0 30px 70px -26px rgba(15,16,35,.55);overflow:hidden">
      <div style="background:linear-gradient(120deg,#5A3DF5 0%,#13A18F 100%);padding:16px 18px;color:#fff">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
          <div style="display:flex;align-items:center;gap:11px"><span style="width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg></span><div><div style="font-size:14.5px;font-weight:800;line-height:1.1">Need a hand?</div><div style="font-size:11.5px;color:rgba(255,255,255,.85);margin-top:2px">We usually reply within a few hours</div></div></div>
          <button onClick="{{ closeHelp }}" aria-label="Close help" style="width:26px;height:26px;border-radius:7px;border:none;background:rgba(255,255,255,.16);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0" style-hover="background:rgba(255,255,255,.3)"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"></path></svg></button>
        </div>
      </div>
      <div style="padding:16px 18px 18px">
        <sc-if value="{{ helpSent }}" hint-placeholder-val="{{ false }}">
          <div style="text-align:center;padding:8px 4px 6px">
            <span style="display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;background:#E4F0FF;margin-bottom:12px"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#2D8BFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"></path></svg></span>
            <div style="font-family:'Poppins',serif;font-weight:800;font-size:17px;color:#0F1023;margin-bottom:5px">Ticket sent</div>
            <p style="font-size:13px;line-height:1.55;color:#7C7669;margin:0 0 4px">We'll email you a reply. Your reference is</p>
            <div style="font-size:13.5px;font-weight:800;color:#5A3DF5;margin-bottom:14px">{{ ticketRef }}</div>
            <button onClick="{{ resetTicket }}" style="font-size:12.5px;font-weight:700;font-family:inherit;color:#4B5563;background:#F2EBDD;border:none;padding:9px 15px;border-radius:9px;cursor:pointer" style-hover="background:#E9E0CE">Send another</button>
          </div>
        </sc-if>
        <sc-if value="{{ helpNotSent }}" hint-placeholder-val="{{ true }}">
          <input value="{{ ticketTopic }}" onChange="{{ onTopic }}" placeholder="Subject (optional)" style="width:100%;border:1px solid #E6DECD;border-radius:10px;padding:10px 12px;font-size:13px;color:#0F1023;outline:none;margin-bottom:9px" style-focus="border-color:#5A3DF5">
          <textarea value="{{ ticketMsg }}" onChange="{{ onMsg }}" placeholder="Describe what you need help with…" style="width:100%;min-height:84px;resize:vertical;border:1px solid #E6DECD;border-radius:10px;padding:11px 12px;font-size:13px;line-height:1.5;color:#0F1023;background:#fff;outline:none;margin-bottom:11px;font-family:inherit" style-focus="border-color:#5A3DF5"></textarea>
          <button onClick="{{ sendTicket }}" disabled="{{ sendDisabled }}" style="{{ sendStyle }}"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>Send ticket</button>
          <div style="display:flex;align-items:center;gap:10px;margin:13px 0 0"><span style="flex:1;height:1px;background:#EEF1F8"></span><span style="font-size:11px;color:#A6ACC0">or</span><span style="flex:1;height:1px;background:#EEF1F8"></span></div>
          <a href="{{ helpHref }}" style="display:flex;align-items:center;gap:10px;margin-top:11px;padding:11px 12px;background:#F3F8F7;border:1px solid #DCEBE6;border-radius:11px" style-hover="border-color:#BBD8D0">
            <span style="width:30px;height:30px;border-radius:8px;background:#ECE9FE;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#5A3DF5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.1 9a3 3 0 1 1 4 2.8c-.9.4-1.6 1.1-1.6 2.2M12 17h.01"></path></svg></span>
            <div style="flex:1;min-width:0"><div style="font-size:12.5px;font-weight:700;color:#0F1023">Browse the Help Center</div><div style="font-size:11px;color:#9AA1B4">Guides &amp; common questions</div></div>
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#C7CCDC" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M9 6l6 6-6 6"></path></svg>
          </a>
        </sc-if>
      </div>
    </div>
  </sc-if>
  <button onClick="{{ toggleHelp }}" aria-label="Help and support" title="Need help? Send a ticket" style="{{ helpFabStyle }}">
    <sc-if value="{{ helpOpen }}" hint-placeholder-val="{{ false }}"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"></path></svg></sc-if>
    <sc-if value="{{ helpClosed }}" hint-placeholder-val="{{ true }}"><svg viewBox="0 0 24 24" width="25" height="25" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.1 9a3 3 0 1 1 4 2.8c-.9.4-1.6 1.1-1.6 2.2M12 17h.01"></path></svg></sc-if>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:520},&quot;offsetBottom&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:24,&quot;tsType&quot;:&quot;number&quot;},&quot;helpHref&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Help Center.dc.html&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { helpOpen: false, helpSent: false, ticketTopic: '', ticketMsg: '', ticketRef: '' };
  sendTicket(){
    if(!this.state.ticketMsg.trim()) return;
    this.setState({ helpSent:true, ticketRef:'RL-'+Math.floor(1000+Math.random()*9000) });
  }
  renderVals(){
    const offset = this.props.offsetBottom ?? 24;
    const helpHref = this.props.helpHref ?? 'Help Center.dc.html';
    const helpOpen = this.state.helpOpen, helpSent = this.state.helpSent;
    const sendDisabled = !this.state.ticketMsg.trim();
    return {
      containerStyle: 'position:fixed;right:24px;bottom:'+offset+'px;z-index:60;display:flex;flex-direction:column;align-items:flex-end;gap:14px',
      helpHref,
      helpOpen, helpClosed: !helpOpen, helpSent, helpNotSent: !helpSent,
      toggleHelp: () => this.setState(s => ({ helpOpen: !s.helpOpen })),
      closeHelp: () => this.setState({ helpOpen: false }),
      ticketTopic: this.state.ticketTopic, ticketMsg: this.state.ticketMsg, ticketRef: this.state.ticketRef,
      onTopic: (e) => { const v=e.target.value; this.setState({ ticketTopic: v }); },
      onMsg: (e) => { const v=e.target.value; this.setState({ ticketMsg: v }); },
      sendTicket: () => this.sendTicket(),
      resetTicket: () => this.setState({ helpSent:false, ticketTopic:'', ticketMsg:'', ticketRef:'' }),
      sendDisabled,
      sendStyle: 'display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:700;font-family:inherit;color:#fff;border:none;padding:10px 16px;border-radius:9px;width:100%;' + (sendDisabled ? 'background:#BFE0DA;cursor:not-allowed' : 'background:#5A3DF5;cursor:pointer'),
      helpFabStyle: 'width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 16px 34px -10px rgba(90,61,245,.55);transition:background .2s,transform .15s;' + (helpOpen ? 'background:#0F1023' : 'background:#5A3DF5'),
    };
  }
}
</script>
</body>
</html>
