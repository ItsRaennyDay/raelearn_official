<style>
@keyframes db-draw{to{stroke-dashoffset:0}}
@keyframes db-drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,-20px)}}
@keyframes db-drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-16px,16px)}}
@keyframes db-drift3{0%,100%{transform:translate(0,0)}50%{transform:translate(12px,18px)}}
@keyframes db-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes db-sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
@keyframes db-fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes db-swipe{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes db-twinkle{0%,100%{opacity:.12;transform:scale(.65)}50%{opacity:.5;transform:scale(1)}}
@media (prefers-reduced-motion: reduce){
  .db *{animation:none!important;transform:none!important}
  .db [data-draw]{stroke-dashoffset:0!important}
  .db [data-fade]{opacity:1!important}
}
</style>
</helmet>
