<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{background:#F1F3FB;color:#0F1023;font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:clip}
    a{color:inherit;text-decoration:none}
    h1,h2,h3{text-wrap:balance}
  </style>
</helmet>

<div style="display:flex;align-items:stretch;min-height:100vh">
  <dc-import name="AppSidebar" mode="learner" current="certificates" hint-size="248px,100%" style="flex:0 0 248px"></dc-import>

  <div style="flex:1;min-width:0;display:flex;flex-direction:column;min-height:100vh;background:#F1F3FB">
    <dc-import name="AppTopBar" mode="learner" eyebrow="My learning" title="Certificates" hint-size="100%,68px" style="display:block;width:100%"></dc-import>

    <main style="flex:1;width:100%;max-width:1020px;margin:0 auto;padding:26px 30px 64px">

      <!-- EARNED -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><h2 style="font-family:'Poppins',serif;font-weight:700;font-size:19px;margin:0;color:#0F1023">Earned</h2><span style="font-size:13px;color:#8A90A6">2 certificates</span></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px;margin-bottom:30px">
        <sc-for list="{{ earned }}" as="c" hint-placeholder-count="2">
          <div style="background:#fff;border:1px solid #E7E9F2;border-radius:16px;overflow:hidden">
            <div style="background:linear-gradient(135deg,#FBF3DE 0%,#F5E7C4 100%);padding:22px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #EFE2C4">
              <span style="width:52px;height:52px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(160,120,20,.18)"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#7B61FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="5"></circle><path d="M8.5 13.5L7 21l5-2.5L17 21l-1.5-7.5"></path></svg></span>
              <div><div style="font-family:'Poppins',serif;font-weight:800;font-size:17px;color:#0F1023">{{ c.title }}</div><div style="font-size:12px;color:#9A7B2E;font-weight:700;margin-top:2px">{{ c.issued }}</div></div>
            </div>
            <div style="padding:18px;display:flex;align-items:center;justify-content:space-between;gap:12px">
              <div style="font-size:12.5px;color:#8A90A6">Credential ID<div style="font-size:13px;font-weight:700;color:#3D4A66;margin-top:1px">{{ c.cid }}</div></div>
              <div style="display:flex;gap:8px"><a href="#" style="font-size:12.5px;font-weight:700;color:#fff;background:#0F1023;padding:9px 14px;border-radius:9px" style-hover="background:#000">Download</a><a href="#" style="font-size:12.5px;font-weight:700;color:#0F1023;border:1.5px solid #E1E5F0;padding:9px 14px;border-radius:9px" style-hover="border-color:#0F1023">Share</a></div>
            </div>
          </div>
        </sc-for>
      </div>

      <!-- IN PROGRESS -->
      <h2 style="font-family:'Poppins',serif;font-weight:700;font-size:19px;margin:0 0 14px;color:#0F1023">In progress</h2>
      <div style="display:flex;flex-direction:column;gap:13px">
        <sc-for list="{{ inProgress }}" as="c" hint-placeholder-count="2">
          <div style="background:#fff;border:1px solid #E7E9F2;border-radius:16px;padding:20px 22px">
            <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
              <span style="width:44px;height:44px;border-radius:50%;background:#F1ECE0;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="#A6ACC0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="5"></circle><path d="M8.5 13.5L7 21l5-2.5L17 21l-1.5-7.5"></path></svg></span>
              <div style="flex:1"><div style="font-family:'Poppins',serif;font-weight:700;font-size:16.5px;color:#0F1023">{{ c.title }}</div><div style="font-size:12.5px;color:#8A90A6;margin-top:2px">{{ c.metLabel }}</div></div>
              <span style="font-family:'Poppins',serif;font-weight:800;font-size:20px;color:#7B61FF">{{ c.pctLabel }}</span>
            </div>
            <div style="height:7px;background:#EDE6D8;border-radius:99px;overflow:hidden;margin-bottom:14px"><div style="height:100%;width:{{ c.pct }}%;background:#7B61FF;border-radius:99px"></div></div>
            <div style="font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#A6ACC0;margin-bottom:9px">Requirements</div>
            <div style="display:flex;flex-direction:column;gap:7px">
              <sc-for list="{{ c.reqs }}" as="r" hint-placeholder-count="3">
                <div style="display:flex;align-items:center;gap:10px;font-size:13.5px"><span style="{{ r.dot }}">{{ r.mark }}</span><span style="color:{{ r.color }}">{{ r.label }}</span></div>
              </sc-for>
            </div>
          </div>
        </sc-for>
      </div>

    </main>

    <dc-import name="SiteFooter" hint-size="100%,360px" style="display:block;width:100%"></dc-import>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  renderVals() {
    const earned = [
      { title:'Nonprofit Operations VA', issued:'Issued Jun 2026', cid:'RL-NPO-2046' },
      { title:'Website Maintenance for VAs', issued:'Issued Apr 2026', cid:'RL-WMV-1985' },
    ];
    const reqRow = (label, done) => ({
      label, done,
      color: done ? '#6F695F' : '#9AA1B4',
      mark: done ? '✓' : '',
      dot: 'width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;' + (done ? 'background:#E4F0FF;color:#2D8BFF' : 'background:#EFEAE0;color:#A6ACC0'),
    });
    const inProgress = [
      { title:'Nonprofit VA Path', pct:68, met:'4 of 6 courses', reqs:[
        reqRow('Complete 6 required courses (4 done)', false),
        reqRow('Pass final path assessment', false),
        reqRow('Complete onboarding module', true),
      ]},
      { title:'Donor Operations Certificate', pct:35, met:'2 of 5 courses', reqs:[
        reqRow('Complete 5 required courses (2 done)', false),
        reqRow('Submit CRM cleanup project', false),
      ]},
    ].map(c => ({ title:c.title, pct:c.pct, pctLabel:c.pct+'%', metLabel:c.met+' complete', reqs:c.reqs }));
    return { earned, inProgress };
  }
}
</script>
</body>
</html>
