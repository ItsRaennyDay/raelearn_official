<!DOCTYPE html>

</head>

      <path d="M48 98 a12 12 0 0 1 24 0" stroke="#0F1023" stroke-width="2.2" stroke-linecap="round"></path>

  <sc-if value="{{ isShield }}" hint-placeholder-val="{{ false }}">

  </sc-if>
  <sc-if value="{{ isBlocks }}" hint-placeholder-val="{{ false }}">

  <sc-if value="{{ isTools }}" hint-placeholder-val="{{ false }}">

  </sc-if>
  <sc-if value="{{ isWifi }}" hint-placeholder-val="{{ false }}">

      <path d="M66 100 a21 21 0 0 1 4 -41 a25 25 0 0 1 48 6 a17 17 0 0 1 -4 35 Z" fill="{{ accent }}" fill-opacity=".10" stroke="#0F1023" stroke-width="2.4" stroke-linejoin="round"></path>

      <circle cx="100" cy="140" r="2.6" fill="#0F1023"></circle>
      <line x1="70" y1="64" x2="132" y2="138" stroke="#5A3DF5" stroke-width="3.4" stroke-linecap="round"></line>
      <path d="M150 44 l0 11 M144.5 49.5 l11 0" stroke="#7B61FF" stroke-width="2.3" stroke-linecap="round"></path>
    </svg>
  </sc-if>
  <sc-if value="{{ isSprout }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 200 160" width="100%" height="100%" fill="none" style="overflow:visible">

      <path d="M100 104 C 100 88 100 80 100 70" stroke="#2D8BFF" stroke-width="2.6" stroke-linecap="round"></path>
      <path d="M100 86 C 86 86 80 76 82 68 C 94 68 100 76 100 86Z" fill="#2D8BFF" fill-opacity=".18" stroke="#2D8BFF" stroke-width="2.2" stroke-linejoin="round"></path>

      <path d="M142 42 l0 10 M137 47 l10 0" stroke="#5A3DF5" stroke-width="2.2" stroke-linecap="round"></path>
      <circle cx="150" cy="92" r="3" fill="#00C6E8"></circle>
    </svg>
  </sc-if>
  <sc-if value="{{ isSearch }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 200 160" width="100%" height="100%" fill="none" style="overflow:visible">
      <rect x="44" y="44" width="78" height="56" rx="10" stroke="#0F1023" stroke-width="2.2" stroke-dasharray="3 7" opacity=".4"></rect>
      <line x1="58" y1="64" x2="108" y2="64" stroke="#0F1023" stroke-width="2.2" opacity=".2"></line>
      <line x1="58" y1="78" x2="94" y2="78" stroke="#0F1023" stroke-width="2.2" opacity=".15"></line>
      <g transform="translate(110,90)"><circle cx="0" cy="0" r="26" fill="{{ accent }}" fill-opacity=".10" stroke="#0F1023" stroke-width="2.6"></circle><line x1="19" y1="19" x2="40" y2="40" stroke="#0F1023" stroke-width="3.4" stroke-linecap="round"></line><path d="M-8 -5 a8 8 0 0 1 15 4 c0 5 -7 6 -7 11" stroke="{{ accent }}" stroke-width="2.6" stroke-linecap="round"></path><circle cx="0" cy="20" r="1.9" fill="{{ accent }}"></circle></g>

    </svg>
  </sc-if>
  <sc-if value="{{ isDone }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 200 160" width="100%" height="100%" fill="none" style="overflow:visible">
      <rect x="50" y="40" width="96" height="80" rx="12" fill="{{ accent }}" fill-opacity=".10" stroke="#0F1023" stroke-width="2.4"></rect>
      <g stroke="#2D8BFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M64 62 l5 5 l9 -10"></path><path d="M64 84 l5 5 l9 -10"></path><path d="M64 106 l5 5 l9 -10"></path></g>
      <line x1="90" y1="64" x2="132" y2="64" stroke="#0F1023" stroke-width="2.4" opacity=".4"></line>
      <line x1="90" y1="86" x2="132" y2="86" stroke="#0F1023" stroke-width="2.4" opacity=".4"></line>
      <line x1="90" y1="108" x2="118" y2="108" stroke="#0F1023" stroke-width="2.4" opacity=".4"></line>
      <path d="M152 34 l5 11 l12 1 l-9 8 l3 12 l-11 -6 l-11 6 l3 -12 l-9 -8 l12 -1 Z" fill="#7B61FF" fill-opacity=".25" stroke="#7B61FF" stroke-width="2.2" stroke-linejoin="round"></path>
      <rect x="38" y="30" width="9" height="9" rx="2" fill="#5A3DF5" transform="rotate(20 42 34)"></rect>
      <circle cx="44" cy="122" r="4" fill="#00C6E8"></circle>
      <path d="M170 110 l0 9 M165.5 114.5 l9 0" stroke="#7B61FF" stroke-width="2.2" stroke-linecap="round"></path>
    </svg>
  </sc-if>
  <sc-if value="{{ isCalendar }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 200 160" width="100%" height="100%" fill="none" style="overflow:visible">
      <rect x="38" y="46" width="84" height="74" rx="10" fill="{{ accent }}" fill-opacity=".10" stroke="#0F1023" stroke-width="2.4"></rect>
      <line x1="38" y1="68" x2="122" y2="68" stroke="#0F1023" stroke-width="2.4"></line>
      <line x1="56" y1="40" x2="56" y2="54" stroke="#0F1023" stroke-width="2.6" stroke-linecap="round"></line>
      <line x1="104" y1="40" x2="104" y2="54" stroke="#0F1023" stroke-width="2.6" stroke-linecap="round"></line>
      <g fill="#0F1023" opacity=".3"><circle cx="58" cy="84" r="3"></circle><circle cx="80" cy="84" r="3"></circle><circle cx="102" cy="84" r="3"></circle><circle cx="58" cy="102" r="3"></circle><circle cx="80" cy="102" r="3"></circle></g>
      <path d="M122 98 q 22 0 26 -18" stroke="{{ accent }}" stroke-width="2.6" stroke-dasharray="1.5 7" stroke-linecap="round"></path>

  </sc-if>
  <sc-if value="{{ isFunnel }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 200 160" width="100%" height="100%" fill="none" style="overflow:visible">
      <g fill="#0F1023" opacity=".3"><circle cx="78" cy="34" r="4"></circle><circle cx="100" cy="30" r="4"></circle><circle cx="122" cy="34" r="4"></circle></g>
      <path d="M60 50 L140 50 L112 88 L112 118 L88 104 L88 88 Z" fill="{{ accent }}" fill-opacity=".12" stroke="#0F1023" stroke-width="2.6" stroke-linejoin="round"></path>

      <line x1="96" y1="146" x2="104" y2="146" stroke="#5A3DF5" stroke-width="2.4" stroke-linecap="round"></line>
      <path d="M150 44 l0 11 M144.5 49.5 l11 0" stroke="#00C6E8" stroke-width="2.2" stroke-linecap="round"></path>
    </svg>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:180},&quot;kind&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;map&quot;,&quot;plane&quot;,&quot;key&quot;,&quot;shield&quot;,&quot;blocks&quot;,&quot;tools&quot;,&quot;wifi&quot;,&quot;sprout&quot;,&quot;search&quot;,&quot;done&quot;,&quot;calendar&quot;,&quot;funnel&quot;],&quot;default&quot;:&quot;map&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#00C6E8&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const k = this.props.kind || 'map';
    return {
      accent: this.props.accent || '#00C6E8',
      isMap:k==='map', isPlane:k==='plane', isKey:k==='key', isShield:k==='shield',
      isBlocks:k==='blocks', isTools:k==='tools', isWifi:k==='wifi', isSprout:k==='sprout',
      isSearch:k==='search', isDone:k==='done', isCalendar:k==='calendar', isFunnel:k==='funnel',
    };
  }
}
</script>
</body>
</html>
